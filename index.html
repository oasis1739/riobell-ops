<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Han-A OPS v4.2 (Modernized & Grouped)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Oswald:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #F8F9FA;
    --bg-card: #FFFFFF;
    --border: #E9ECEF;
    --text-main: #212529;
    --text-sub: #6C757D;
    --text-light: #ADB5BD;
    --primary: #2563EB;
    --primary-light: #DBEAFE;
    --danger: #DC2626;
    --danger-light: #FEE2E2;
    --success: #16A34A;
    --warning: #D97706;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-main); color: var(--text-main); font-size: 13px; min-height: 100vh; }
  
  /* Utilities */
  .text-primary { color: var(--primary) !important; }
  .text-danger { color: var(--danger) !important; }
  .text-success { color: var(--success) !important; }
  .text-warning { color: var(--warning) !important; }
  .font-mono { font-family: 'DM Mono', monospace; }
  
  /* Top Nav */
  .topnav { display: flex; align-items: center; background: var(--bg-card); padding: 0 24px; height: 60px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .logo { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; margin-right: 32px; }
  .logo em { color: var(--primary); font-style: normal; }
  .tabs { display: flex; height: 100%; gap: 8px; }
  .tab { padding: 0 16px; font-size: 14px; font-weight: 500; color: var(--text-sub); border: none; background: transparent; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
  .tab:hover { color: var(--text-main); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
  .topnav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .filter-box { display: flex; align-items: center; gap: 6px; background: var(--bg-main); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); }
  .btn-upload { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .btn-outline { background: white; border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size:12px; }
  .date-input { border: none; background: transparent; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-main); outline: none; cursor: pointer;}
  
  /* Dashboard Layout */
  .container { padding: 24px; max-width: 1600px; margin: 0 auto; }
  .card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 20px; margin-bottom: 24px;}
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  
  /* KPI Row */
  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-title { font-size: 12px; color: var(--text-sub); font-weight: 500; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; font-family: 'Oswald', sans-serif; line-height: 1.2; margin-bottom: 8px; }
  .kpi-sub { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 6px; }
  .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-success { background: #dcfce7; color: var(--success); }

  /* Main Grid */
  .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  
  /* Brand Cards */
  .brand-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .brand-card { border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: 0.2s; border-left: 4px solid var(--border); }
  .brand-card:hover { border-color: var(--primary); transform: translateY(-2px); }
  .brand-card.active { border-color: var(--primary); border-left: 4px solid var(--primary); background: var(--primary-light); }
  .bc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .bc-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-main); color: var(--text-sub); }
  .bc-amt { font-size: 22px; font-weight: 700; font-family: 'Oswald', sans-serif; margin-bottom: 8px; }

  /* Detail Panel */
  .detail-box-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .detail-box { background: var(--bg-main); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  
  /* Tables (Daily & Heatmap) */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { background: var(--bg-main); padding: 10px 12px; font-weight: 600; color: var(--text-sub); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); white-space: nowrap; }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); text-align: right; }
  .data-table td:first-child { text-align: left; font-weight: 500; position: sticky; left: 0; background: var(--bg-card); z-index: 10; border-right: 2px solid var(--border); }
  
  /* Utilities & Overlays */
  .page { display: none; }
  .page.active { display: block; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .upload-box { background: var(--bg-card); padding: 40px; border-radius: 16px; text-align: center; width: 500px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: white; padding: 12px 24px; border-radius: 8px; transition: 0.3s; transform: translateY(100px); opacity: 0; z-index: 1000; }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header class="topnav">
  <div class="logo">Han<em>-</em>A <span style="font-size:12px; color:var(--text-light); font-weight:400;">v4.2</span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">전체 현황</button>
    <button class="tab" onclick="switchTab('monthly')">월별 추이</button>
    <button class="tab" onclick="switchTab('daily')">일별 실적</button>
    <button class="tab" onclick="switchTab('heatmap')">히트맵</button>
  </div>
  <div class="topnav-right">
    <div class="filter-box">
      <span style="font-size:11px; color:var(--text-sub);">그룹</span>
      <select id="groupFilter" class="date-input" onchange="renderAll()">
        <option value="all">전체보기</option>
        <option value="신원">신원</option>
        <option value="라성">라성</option>
        <option value="한아물산">한아물산</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="filter-box">
      <input type="date" id="dateFrom" class="date-input" onchange="renderAll()">
      <span style="color:var(--text-light)">~</span>
      <input type="date" id="dateTo" class="date-input" onchange="renderAll()">
    </div>
    
    <button class="btn-outline" onclick="clearData()" style="color:var(--danger)">초기화</button>
    <button class="btn-upload" onclick="document.getElementById('uploadModal').classList.add('show')">데이터 추가</button>
  </div>
</header>

<div class="container">
  <div class="kpi-grid">
    <div class="card" style="margin-bottom:0;"><div class="kpi-title">완료 금액</div><div class="kpi-value text-primary" id="kpi-complete">₩0</div><div class="kpi-sub" id="kpi-complete-sub">0건</div></div>
    <div class="card" style="margin-bottom:0;"><div class="kpi-title">순매출 (완료 - 반품)</div><div class="kpi-value" id="kpi-net">₩0</div><div class="kpi-sub text-success" id="kpi-net-sub">—</div></div>
    <div class="card" style="margin-bottom:0;"><div class="kpi-title">반품 금액</div><div class="kpi-value text-danger" id="kpi-return">₩0</div><div class="kpi-sub" id="kpi-return-sub">0건 <span class="badge badge-danger" id="kpi-return-rate">0%</span></div></div>
    <div class="card" style="margin-bottom:0;"><div class="kpi-title">총 주문건수</div><div class="kpi-value" id="kpi-total-cnt">0</div><div class="kpi-sub">조회 기간 내 전체</div></div>
    <div class="card" style="margin-bottom:0; border-left:4px solid var(--warning);"><div class="kpi-title">월 목표 달성률 <input type="number" id="goalInput" onchange="updateGoal()" placeholder="목표액 입력" style="width:80px; font-size:10px; margin-left:8px;"></div><div class="kpi-value text-warning" id="kpi-goal-pct">0%</div></div>
  </div>

  <div id="page-overview" class="page active">
    <div class="main-grid">
      <div class="left-col">
        <div class="card"><div class="card-title">매출 추이</div><div style="height: 250px;"><canvas id="mainChart"></canvas></div></div>
        <div class="card"><div class="card-title">브랜드별 실적</div><div class="brand-grid" id="brandGrid"></div></div>
      </div>
      <div class="right-col">
        <div class="card" id="brandDetailCard">
          <div class="card-title" style="border-bottom: 2px solid var(--primary); padding-bottom: 12px;"><span id="detailBrandName">브랜드를 선택하세요</span></div>
          <div class="detail-box-grid">
            <div class="detail-box"><div class="detail-box-lbl">완료금액</div><div class="detail-box-val text-primary" id="dt-complete">₩0</div></div>
            <div class="detail-box"><div class="detail-box-lbl">반품금액</div><div class="detail-box-val text-danger" id="dt-return">₩0</div></div>
          </div>
          <div class="card-title" style="margin-top: 16px; font-size:13px;">채널별 매출 (Top 5)</div>
          <div id="detailChannelList" style="font-size:12px; color:var(--text-sub);"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-monthly" class="page">
    <div class="card" style="text-align:center; padding: 100px; color:var(--text-sub);"><h2>월별 추이 탭</h2><p>기존 구조와 동일하게 차트 추가 예정 (요청 시 즉시 구현)</p></div>
  </div>

  <div id="page-daily" class="page">
    <div class="card">
      <div class="card-title">일별 실적 상세 테이블</div>
      <div class="table-wrap" id="dailyTableWrap"><div style="padding:40px; text-align:center; color:var(--text-light)">데이터를 로드 중이거나 없습니다.</div></div>
    </div>
  </div>

  <div id="page-heatmap" class="page">
    <div class="card">
      <div class="card-title">브랜드 × 채널 히트맵 (완료금액 기준)</div>
      <div class="table-wrap" id="heatmapWrap"><div style="padding:40px; text-align:center; color:var(--text-light)">데이터를 로드 중이거나 없습니다.</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="uploadModal">
  <div class="upload-box">
    <h2 style="margin-bottom: 24px;">데이터 업로드</h2>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(this.files)">
    <div style="border: 2px dashed var(--border); padding: 40px; cursor: pointer; background: var(--bg-main);" onclick="document.getElementById('fileInput').click()">
      <div style="font-size: 32px; margin-bottom: 12px;">📁</div><div>엑셀 파일을 클릭하여 업로드</div>
    </div>
    <div id="pbText" style="margin-top:16px; font-size:12px; color:var(--text-sub);"></div>
    <button class="btn-outline" style="margin-top:24px;" onclick="document.getElementById('uploadModal').classList.remove('show')">닫기</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let DB = [];
let chartInstance = null;
let curTab = 'overview';

function esc(str) { return String(str||'').replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m])); }
function won(n) { return Math.round(n).toLocaleString(); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

// 그룹 매핑 로직
function getGroup(brandName) {
  const b = String(brandName).trim().toLowerCase();
  if(['씨','베스띠벨리','지이크','파렌하이트'].includes(b) || b.includes('si') || b.includes('sieg')) return '신원';
  if(['리오벨','헤니트','드베터'].includes(b)) return '라성';
  if(['엔니튜드','마리본','제이슨우','막스스튜디오','르뎁트'].includes(b) || b.includes('ennittude') || b.includes('maribon')) return '한아물산';
  return '기타';
}

async function init() {
  try {
    const saved = await localforage.getItem('hana_db_v4_2');
    if (saved) DB = saved;
    const goal = await localforage.getItem('hana_goal');
    if (goal) document.getElementById('goalInput').value = goal;
  } catch (e) {}
  
  if (DB.length > 0) {
    const dates = DB.map(r => r.date).sort();
    document.getElementById('dateFrom').value = dates[0];
    document.getElementById('dateTo').value = dates[dates.length - 1];
    renderAll();
  } else {
    document.getElementById('uploadModal').classList.add('show');
  }
}

async function updateGoal() { await localforage.setItem('hana_goal', document.getElementById('goalInput').value); renderKPI(); }
async function clearData() { if(confirm('초기화하시겠습니까?')) { DB=[]; await localforage.clear(); location.reload(); } }

function switchTab(tabId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tabId).classList.add('active');
  event.target.classList.add('active');
  curTab = tabId;
  renderAll();
}

async function handleFiles(files) {
  const arr = [...files].filter(f => /\.(xlsx|xls)$/i.test(f.name));
  if(!arr.length) return;
  
  for (let i = 0; i < arr.length; i++) {
    document.getElementById('pbText').textContent = `${arr[i].name} 파싱 중...`;
    const parsed = await parseXLSX(arr[i]);
    const newDates = new Set(parsed.map(r => r.date));
    DB = DB.filter(r => !newDates.has(r.date)).concat(parsed);
  }
  
  const seen = new Set();
  DB = DB.filter(r => { if(!r.orderId) return true; if(seen.has(r.orderId)) return false; seen.add(r.orderId); return true; });
  DB.sort((a,b) => a.date.localeCompare(b.date));
  
  await localforage.setItem('hana_db_v4_2', DB);
  document.getElementById('uploadModal').classList.remove('show');
  
  const dates = DB.map(r => r.date).sort();
  if(!document.getElementById('dateFrom').value) document.getElementById('dateFrom').value = dates[0];
  if(!document.getElementById('dateTo').value) document.getElementById('dateTo').value = dates[dates.length - 1];
  
  showToast('저장 완료!');
  renderAll();
}

function parseXLSX(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:null, raw:true});
        if(rows.length < 2) return resolve([]);
        
        const res = [];
        const isSabangnet = String(rows[0][0]||'').trim() === 'No.';
        
        for(let i=1; i<rows.length; i++) {
          const r = rows[i];
          if(!r[0]) continue;
          
          let dateStr = isSabangnet ? String(r[4]||'').substring(0,10) : `2024-03-${String(i%30+1).padStart(2,'0')}`;
          if(dateStr.length !== 10) continue;
          
          const status = String(r[3]||r[29]||'주문완료').includes('반품') ? 'return' : 'complete';
          const brand = (isSabangnet ? r[2] : r[18]) || '미분류';
          const price = parseFloat(String(isSabangnet ? r[23] : r[22]).replace(/[,\s₩]/g, '')) || 0;
          
          res.push({
            date: dateStr, ym: dateStr.substring(0,7), brand: brand,
            group: getGroup(brand), channel: (isSabangnet ? r[1] : r[5]) || '기타',
            orderId: isSabangnet ? r[7] : r[7], status: status,
            completeAmt: status === 'complete' ? price : 0, retAmt: status === 'return' ? price : 0
          });
        }
        resolve(res);
      } catch(err) { resolve([]); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function getData() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const grp = document.getElementById('groupFilter').value;
  
  return DB.filter(r => {
    if(from && r.date < from) return false;
    if(to && r.date > to) return false;
    if(grp !== 'all' && r.group !== grp) return false;
    return true;
  });
}

function renderAll() {
  if (!DB.length) return;
  renderKPI();
  if(curTab === 'overview') { renderChart(); renderBrands(); }
  if(curTab === 'daily') renderDailyTable();
  if(curTab === 'heatmap') renderHeatmap();
}

function renderKPI() {
  const data = getData();
  const cAmt = data.filter(r => r.status === 'complete').reduce((s, r) => s + r.completeAmt, 0);
  const rAmt = data.filter(r => r.status === 'return').reduce((s, r) => s + r.retAmt, 0);
  const cCnt = data.filter(r => r.status === 'complete').length;
  const rCnt = data.filter(r => r.status === 'return').length;
  const retRate = cAmt > 0 ? Math.round((rAmt / cAmt) * 100) : 0;
  
  document.getElementById('kpi-complete').textContent = `₩${won(cAmt)}`;
  document.getElementById('kpi-complete-sub').textContent = `${cCnt.toLocaleString()}건`;
  document.getElementById('kpi-net').textContent = `₩${won(cAmt - rAmt)}`;
  document.getElementById('kpi-return').textContent = `₩${won(rAmt)}`;
  document.getElementById('kpi-return-sub').innerHTML = `${rCnt.toLocaleString()}건 <span class="badge ${retRate >= 20 ? 'badge-danger' : 'badge-success'}">반품 ${retRate}%</span>`;
  document.getElementById('kpi-total-cnt').textContent = (cCnt + rCnt).toLocaleString();
  
  const goal = Number(document.getElementById('goalInput').value) || 0;
  document.getElementById('kpi-goal-pct').textContent = goal > 0 ? `${Math.round((cAmt / goal) * 100)}%` : '-';
}

function renderChart() {
  const data = getData();
  const dayMap = {};
  data.forEach(r => {
    if (!dayMap[r.date]) dayMap[r.date] = { cAmt: 0 };
    if (r.status === 'complete') dayMap[r.date].cAmt += r.completeAmt;
  });
  const labels = Object.keys(dayMap).sort();
  const completeData = labels.map(d => dayMap[d].cAmt);

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('mainChart').getContext('2d'), {
    type: 'bar',
    data: { labels: labels.map(d => d.slice(5)), datasets: [{ label: '완료금액', data: completeData, backgroundColor: '#DBEAFE', hoverBackgroundColor: '#2563EB', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { display: false } } }
  });
}

function renderBrands() {
  const data = getData();
  const bMap = {};
  data.forEach(r => {
    if (!bMap[r.brand]) bMap[r.brand] = { group: r.group, cAmt: 0, rAmt: 0 };
    if (r.status === 'complete') bMap[r.brand].cAmt += r.completeAmt;
    if (r.status === 'return') bMap[r.brand].rAmt += r.retAmt;
  });

  const brands = Object.entries(bMap).sort((a,b) => b[1].cAmt - a[1].cAmt);
  const grid = document.getElementById('brandGrid');
  grid.innerHTML = brands.map(([name, v], i) => `
    <div class="brand-card ${i===0?'active':''}" onclick="selectBrand(this, '${esc(name)}')">
      <div class="bc-header"><div style="font-weight:700;">${esc(name)}</div><div class="bc-tag">${v.group}</div></div>
      <div class="bc-amt text-primary">₩${won(v.cAmt)}</div>
    </div>`).join('');
  if (brands.length > 0) renderBrandDetail(brands[0][0]);
}

function selectBrand(el, brandName) { document.querySelectorAll('.brand-card').forEach(c => c.classList.remove('active')); el.classList.add('active'); renderBrandDetail(brandName); }

function renderBrandDetail(brandName) {
  const data = getData().filter(r => r.brand === brandName);
  const cAmt = data.filter(r => r.status === 'complete').reduce((s, r) => s + r.completeAmt, 0);
  const rAmt = data.filter(r => r.status === 'return').reduce((s, r) => s + r.retAmt, 0);
  
  document.getElementById('detailBrandName').textContent = brandName;
  document.getElementById('dt-complete').textContent = `₩${won(cAmt)}`;
  document.getElementById('dt-return').textContent = `₩${won(rAmt)}`;
  
  const chMap = {};
  data.filter(r => r.status === 'complete').forEach(r => chMap[r.channel] = (chMap[r.channel]||0) + r.completeAmt);
  document.getElementById('detailChannelList').innerHTML = Object.entries(chMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([ch, amt]) => `
    <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
      <span>${esc(ch)}</span><span class="font-mono font-weight-bold">₩${won(amt)}</span>
    </div>`).join('');
}

// 일별 실적 (크로스 테이블)
function renderDailyTable() {
  const data = getData();
  if(!data.length) return document.getElementById('dailyTableWrap').innerHTML = '<div style="padding:40px;text-align:center">데이터 없음</div>';
  
  const dayMap = {}; const bSet = new Set();
  data.forEach(r => {
    if(r.status !== 'complete') return;
    bSet.add(r.brand);
    if(!dayMap[r.date]) dayMap[r.date] = { total: 0, brands: {} };
    dayMap[r.date].total += r.completeAmt;
    dayMap[r.date].brands[r.brand] = (dayMap[r.date].brands[r.brand]||0) + r.completeAmt;
  });
  
  const brands = [...bSet].sort();
  const dates = Object.keys(dayMap).sort().reverse();
  
  let html = `<table class="data-table"><thead><tr><th>날짜</th><th>합계</th>${brands.map(b => `<th>${esc(b)}</th>`).join('')}</tr></thead><tbody>`;
  dates.forEach(d => {
    html += `<tr><td>${d}</td><td style="font-weight:700; color:var(--primary)">₩${won(dayMap[d].total)}</td>`;
    brands.forEach(b => { html += `<td>${dayMap[d].brands[b] ? `₩${won(dayMap[d].brands[b])}` : '-'}</td>`; });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('dailyTableWrap').innerHTML = html;
}

// 히트맵 (브랜드 x 채널)
function renderHeatmap() {
  const data = getData();
  if(!data.length) return document.getElementById('heatmapWrap').innerHTML = '<div style="padding:40px;text-align:center">데이터 없음</div>';
  
  const mat = {}; const channels = new Set(); const brands = new Set();
  let maxVal = 1;
  data.forEach(r => {
    if(r.status !== 'complete') return;
    brands.add(r.brand); channels.add(r.channel);
    if(!mat[r.brand]) mat[r.brand] = {};
    mat[r.brand][r.channel] = (mat[r.brand][r.channel]||0) + r.completeAmt;
    if(mat[r.brand][r.channel] > maxVal) maxVal = mat[r.brand][r.channel];
  });
  
  const bArr = [...brands].sort(); const cArr = [...channels].sort();
  let html = `<table class="data-table"><thead><tr><th>브랜드 \\ 채널</th>${cArr.map(c => `<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>`;
  bArr.forEach(b => {
    html += `<tr><td>${esc(b)}</td>`;
    cArr.forEach(c => {
      const val = mat[b][c] || 0;
      const alpha = val > 0 ? (val / maxVal * 0.8 + 0.1).toFixed(2) : 0;
      const fontColor = (val / maxVal > 0.5) ? '#fff' : 'var(--text-main)';
      html += `<td style="background:rgba(37,99,235,${alpha}); color:${fontColor}">${val ? `₩${won(val)}` : ''}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('heatmapWrap').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', init);
</script>
